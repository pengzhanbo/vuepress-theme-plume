catalogMode: prefer
ignoreWorkspaceRootCheck: true
minimumReleaseAgeExclude:
  - '@pengzhanbo/eslint-config-vue@2.7.0'
  - '@pengzhanbo/eslint-config@2.7.0'
  - '@pengzhanbo/stylelint-config@2.7.0'
shamefullyHoist: true
shellEmulator: true
strictPeerDependencies: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - ua-parser-js
  - cached-factory
  - memfs
  - semver
  - chokidar

packages:
  - docs
  - theme
  - cli
  - plugins/*
  - examples/*

overrides:
  '@bufbuild/protobuf': ^2.12.1
  '@shikijs/core': ^4.2.0
  '@shikijs/transformers': ^4.2.0
  '@shikijs/twoslash': ^4.2.0
  '@xmldom/xmldom': '>=0.9.10'
  axios: '>=1.18.1'
  baseline-browser-mapping: ^2.10.40
  brace-expansion: '>=5.0.6'
  chokidar: 'catalog:prod'
  dompurify: '>=3.4.11'
  fast-uri: '>=4.0.0'
  follow-redirects: '>=1.16.0'
  lodash: '>=4.18.1'
  lodash-es: '>=4.18.1'
  mermaid: '>=11.16.0'
  postcss: '>=8.5.15'
  qs: '>=6.15.3'
  sass-embedded: 'catalog:peer'
  simple-git: '>=3.36.0'
  tmp: '>=0.2.7'
  uuid: '>=14.0.1'
  vite: 'catalog:dev'
  vue: 'catalog:prod'
  vue-router: 'catalog:prod'
  ws: '>=8.21.0'

allowBuilds:
  '@parcel/watcher': true
  core-js: true
  esbuild: true
  simple-git-hooks: true

patchedDependencies:
  floating-vue: patches/floating-vue.patch

